<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>BOH Display</title>
    <link rel="stylesheet" href="public/stylesheet.css" />
    <link rel="icon" type="image/x-icon" href="public/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
          rel="stylesheet">
</head>
<body>
<div class="header">
    <h1>Kitchen V2</h1>
    <h1 class="headerChild" id="connected">Disconnected</h1>
    <div class="credentials headerChild" id="credentials">
        <div class="username headerChild">
            <label for="username">Username: </label>
            <input type="text" id="username" autocomplete="username" />
        </div>
        <div class="password headerChild">
            <label for="password">Password: </label>
            <input type="password" id="password" autocomplete="current-password"/>
        </div>
        <button id="login" class="headerChild">Check</button>
    </div>
    <button id="toggle-completed" class="headerChild" style="display: none;">Show Completed</button>
</div>

<div class="orders-grid">
    <div class="order-card">
        <div class="order-header">
            Table: <br>
            Staff: <br>
            Order ID: 1023
        </div>
        <div class="order-body">
            <div class="item">
                <div class="item-name">Item 1</div>
                <div class="item-comment">comment 1</div>
            </div>
            <div class="item">
                <div class="item-name">Item 2</div>
            </div>
        </div>
        <div class="order-footer">
            <div class="order-time">
                Time active: <time id="timeOfOrder">10:10</time>
            </div>
            <button class="order-button">Complete Order</button>
        </div>
    </div>

    <div class="order-card">
        <div class="order-header">
            Table 2<br>
            Staff Name<br>
            Order ID: 1024
        </div>
        <div class="order-body">
            <div class="item">
                <div class="item-name">Item 1</div>
            </div>
            <div class="item">
                <div class="item-name">Item 2</div>
                <div class="item-comment">extra sauce</div>
            </div>
        </div>
    </div>

    <div class="order-card">
        <div class="order-header">
            Table 8<br>
            Staff Name<br>
            Order ID: 1025
        </div>
        <div class="order-body">
            <div class="item">
                <div class="item-name">Item 1</div>
            </div>
        </div>
    </div>

</div>

</body>
<footer>
    <script src="public/js/constants.js"></script>
    <script src="/global/encryption.js"></script>
    <script src="public/js/state.js"></script>
    <script src="public/js/utils.js"></script>
    <script src="public/js/auth.js"></script>
    <script src="public/js/orders.js"></script>
    <script src="public/js/cards.js"></script>
    <script src="public/js/socket.js"></script>
    <script src="public/js/init.js"></script>
</footer>

</html>
